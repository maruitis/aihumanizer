<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TextHuman — AI Text Humanizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ambient background -->
  <div class="bg-layer" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-mark">TH</span>
        <span class="logo-name">TextHuman</span>
        <span class="logo-tag">Pro</span>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <div class="container">

      <!-- Hero -->
      <section class="hero">
        <h1 class="hero-title">Make AI text sound<br><span class="hero-accent">genuinely human</span></h1>
        <p class="hero-sub">Paste your text. Choose your style. Get prose a real person would have written.</p>
      </section>

      <!-- Workspace -->
      <div class="workspace">

        <!-- Style row -->
        <div class="row-label">Writing Style</div>
        <div class="style-pills" id="stylePills" role="group" aria-label="Writing style">
          <button class="pill active" data-style="passage">Passage</button>
          <button class="pill" data-style="article">Article</button>
          <button class="pill" data-style="research">Research</button>
          <button class="pill" data-style="email">Email</button>
          <button class="pill" data-style="essay">Essay</button>
          <button class="pill" data-style="instagram">Instagram</button>
          <button class="pill" data-style="informative">Informative</button>
          <button class="pill" data-style="emotional">Emotional</button>
        </div>

        <!-- Audience row -->
        <div class="audience-row">
          <div class="select-wrap">
            <div class="row-label">Target Audience</div>
            <select class="audience-select" id="audienceSelect" aria-label="Target audience">
              <option value="general">General Public</option>
              <option value="students">Students</option>
              <option value="professionals">Professionals</option>
              <option value="academics">Academics</option>
              <option value="teenagers">Teenagers</option>
              <option value="executives">Business Executives</option>
              <option value="children">Children</option>
              <option value="creative">Creative Writers</option>
            </select>
          </div>
          <div class="shortcut-hint">Press <kbd>Ctrl</kbd><kbd>Enter</kbd> to humanize</div>
        </div>

        <!-- Editor -->
        <div class="editor">

          <!-- Input panel -->
          <div class="panel" id="inputPanel">
            <div class="panel-top">
              <span class="panel-label">Input</span>
              <span class="wc" id="inputWc">0 words</span>
            </div>
            <textarea
              class="editor-textarea"
              id="inputText"
              placeholder="Paste or type the AI-generated text here..."
              spellcheck="false"
              aria-label="Input text"
            ></textarea>
            <div class="panel-bottom">
              <button class="ghost-btn" id="clearBtn">Clear</button>
            </div>
          </div>

          <!-- Center action column -->
          <div class="editor-mid">
            <button class="humanize-btn" id="humanizeBtn" aria-label="Humanize text">
              <span class="hbtn-label" id="hbtnLabel">Humanize</span>
              <span class="hbtn-arrow" id="hbtnArrow">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 12h14M13 6l6 6-6 6"/>
                </svg>
              </span>
            </button>
          </div>

          <!-- Output panel -->
          <div class="panel" id="outputPanel">
            <div class="panel-top">
              <span class="panel-label">Output</span>
              <span class="wc" id="outputWc">0 words</span>
            </div>
            <div class="editor-output" id="outputText" aria-live="polite" aria-label="Humanized output">
              <span class="output-hint">Your humanized text will appear here.</span>
            </div>
            <div class="panel-bottom">
              <button class="ghost-btn" id="copyBtn" disabled>Copy</button>
            </div>
          </div>

        </div>

        <!-- Mobile humanize button -->
        <button class="humanize-btn-mobile" id="humanizeBtnMobile" aria-label="Humanize text">
          Humanize Text
        </button>

      </div>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
